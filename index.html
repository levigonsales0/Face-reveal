<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Reveal</title>
    <meta name="description" content="A private mutual face reveal room. Both upload. Both reveal." />
    <style>
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111;
        background: linear-gradient(135deg, #fbfbf8, #e7e7e4);
      }
      .boot-fallback {
        width: min(920px, calc(100% - 32px));
        min-height: 100vh;
        margin: 0 auto;
        display: grid;
        place-items: center;
      }
      .boot-card {
        width: 100%;
        border: 1px solid rgba(18, 18, 18, 0.09);
        border-radius: 32px;
        padding: clamp(28px, 6vw, 64px);
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 24px 90px rgba(0, 0, 0, 0.08);
      }
      .boot-pill {
        display: inline-flex;
        margin-bottom: 18px;
        border: 1px solid rgba(18, 18, 18, 0.08);
        border-radius: 999px;
        padding: 8px 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #585854;
      }
      .boot-card h1 {
        margin: 0;
        max-width: 720px;
        font-size: clamp(3rem, 10vw, 7rem);
        line-height: 0.86;
        letter-spacing: -0.095em;
      }
      .boot-card p {
        max-width: 580px;
        margin: 24px 0 0;
        color: #5f5f5c;
        line-height: 1.65;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="boot-fallback">
        <section class="boot-card">
          <span class="boot-pill">Face Reveal</span>
          <h1>Loading reveal room.</h1>
          <p>
            If this stays here, the Vercel deployment is not loading the app bundle or it needs a fresh redeploy from the latest GitHub commit.
          </p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
